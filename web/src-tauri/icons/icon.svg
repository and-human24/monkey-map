<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0eeff"/>
      <stop offset="100%" stop-color="#e8e4ff"/>
    </linearGradient>
    <linearGradient id="face" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>

  <!-- Mind-map branches (behind head) -->
  <!-- Top-right branch -->
  <line x1="620" y1="340" x2="780" y2="200" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="780" y1="200" x2="870" y2="160" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <line x1="780" y1="200" x2="840" y2="130" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <circle cx="780" cy="200" r="14" fill="#4f46e5" opacity="0.4"/>
  <circle cx="870" cy="160" r="10" fill="#4f46e5" opacity="0.3"/>
  <circle cx="840" cy="130" r="10" fill="#4f46e5" opacity="0.3"/>

  <!-- Top-left branch -->
  <line x1="404" y1="340" x2="260" y2="210" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="260" y1="210" x2="170" y2="170" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <line x1="260" y1="210" x2="200" y2="140" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <circle cx="260" cy="210" r="14" fill="#4f46e5" opacity="0.4"/>
  <circle cx="170" cy="170" r="10" fill="#4f46e5" opacity="0.3"/>
  <circle cx="200" cy="140" r="10" fill="#4f46e5" opacity="0.3"/>

  <!-- Bottom-right branch -->
  <line x1="650" y1="620" x2="800" y2="740" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="800" y1="740" x2="880" y2="800" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <line x1="800" y1="740" x2="870" y2="710" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <circle cx="800" cy="740" r="14" fill="#4f46e5" opacity="0.4"/>
  <circle cx="880" cy="800" r="10" fill="#4f46e5" opacity="0.3"/>
  <circle cx="870" cy="710" r="10" fill="#4f46e5" opacity="0.3"/>

  <!-- Bottom-left branch -->
  <line x1="374" y1="620" x2="220" y2="750" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="220" y1="750" x2="150" y2="810" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <line x1="220" y1="750" x2="150" y2="720" stroke="#4f46e5" stroke-width="4" opacity="0.25"/>
  <circle cx="220" cy="750" r="14" fill="#4f46e5" opacity="0.4"/>
  <circle cx="150" cy="810" r="10" fill="#4f46e5" opacity="0.3"/>
  <circle cx="150" cy="720" r="10" fill="#4f46e5" opacity="0.3"/>

  <!-- Monkey head silhouette -->
  <!-- Ears -->
  <circle cx="300" cy="400" r="85" fill="url(#face)"/>
  <circle cx="300" cy="400" r="50" fill="#e8e4ff" opacity="0.5"/>
  <circle cx="724" cy="400" r="85" fill="url(#face)"/>
  <circle cx="724" cy="400" r="50" fill="#e8e4ff" opacity="0.5"/>

  <!-- Main head shape -->
  <ellipse cx="512" cy="480" rx="220" ry="240" fill="url(#face)"/>

  <!-- Face/muzzle area -->
  <ellipse cx="512" cy="540" rx="140" ry="120" fill="#e8e4ff" opacity="0.35"/>

  <!-- Eyes -->
  <ellipse cx="440" cy="440" rx="28" ry="32" fill="#e8e4ff"/>
  <ellipse cx="440" cy="445" rx="14" ry="17" fill="#1e1b4b"/>
  <ellipse cx="584" cy="440" rx="28" ry="32" fill="#e8e4ff"/>
  <ellipse cx="584" cy="445" rx="14" ry="17" fill="#1e1b4b"/>

  <!-- Eye highlights -->
  <circle cx="446" cy="438" r="5" fill="white" opacity="0.8"/>
  <circle cx="590" cy="438" r="5" fill="white" opacity="0.8"/>

  <!-- Nose -->
  <ellipse cx="512" cy="530" rx="50" ry="35" fill="#3730a3" opacity="0.3"/>
  <ellipse cx="495" cy="530" rx="10" ry="12" fill="#1e1b4b" opacity="0.7"/>
  <ellipse cx="529" cy="530" rx="10" ry="12" fill="#1e1b4b" opacity="0.7"/>

  <!-- Subtle smile -->
  <path d="M 475 570 Q 512 595 549 570" fill="none" stroke="#1e1b4b" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Central node dot on forehead (connects to branches) -->
  <circle cx="512" cy="340" r="18" fill="#4f46e5" opacity="0.6"/>
  <circle cx="512" cy="650" r="14" fill="#4f46e5" opacity="0.5"/>

  <!-- Connection lines from central nodes to branches -->
  <line x1="512" y1="340" x2="620" y2="340" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="512" y1="340" x2="404" y2="340" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="512" y1="650" x2="650" y2="620" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
  <line x1="512" y1="650" x2="374" y2="620" stroke="#4f46e5" stroke-width="6" opacity="0.35"/>
</svg>
